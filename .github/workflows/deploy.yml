name: Deploy to DomaiNesia

on:
  push:
    branches:
      - main  # Branch yang dipantau untuk perubahan

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}        # 36.50.77.81
          username: ${{ secrets.SSH_USER }}    # ruangdid
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # private key dari GitHub Secrets
          port: 64000                          # port SSH DomaiNesia
          script: |
            cd /home/ruangdid/app.ruanglari.com
            git pull origin main
            
            # Install package baru Laravel 13
            composer install --no-dev --optimize-autoloader
            
            # Jalankan migrasi database
            php artisan migrate --force
            
            # Jalankan kompilasi asset jika NPM tersedia di server
            npm install
            npm run build
            
            # Optimasi cache untuk performa maksimal di produksi
            php artisan optimize:clear
            php artisan optimize
            php artisan view:cache
            
            # Restart queue worker agar memuat kode Laravel 13 yang baru
            php artisan queue:restart


